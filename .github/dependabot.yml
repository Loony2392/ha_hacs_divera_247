# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    reviewers:
      - "Loony2392"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(actions):"
      include: "scope"
    rebase-strategy: "auto"

  # Python Dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "Loony2392"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"
    ignore:
      - dependency-name: "homeassistant"
    target-branch: "develop"

  # Node.js/NPM (for semantic-release)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:30"
    reviewers:
      - "Loony2392"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(npm):"
      include: "scope"
    rebase-strategy: "auto"

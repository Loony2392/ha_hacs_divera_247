name: 🧪 Tests & Linting

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  lint-and-test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
      - name: 📥 Check out code from GitHub
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff mypy types-all
          pip install -e .

      - name: 🔍 Lint with ruff
        run: |
          ruff check custom_components tests scripts --exit-zero
          ruff format --check custom_components tests scripts --exit-zero

      - name: 📋 Type check with mypy
        run: |
          mypy custom_components --ignore-missing-imports --exit-zero || true

      - name: 🧪 Run tests
        run: |
          pytest tests -v --cov=custom_components --cov-report=xml --cov-report=term-missing

      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
